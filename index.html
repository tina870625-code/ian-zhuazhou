<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇恩的抓周大預測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFBF7; }
        .tab-active { color: #C2A387; border-bottom: 2px solid #C2A387; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVT0MZ0lNt0ZJSRbLfkXKXPTOXjunmK12Q",
            authDomain: "ian20260413.firebaseapp.com",
            projectId: "ian20260413",
            storageBucket: "ian20260413.firebasestorage.app",
            messagingSenderId: "246723199786",
            appId: "1:246723199786:web:f8885a2acd5bf4ddf5d453"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 將功能掛載到 window 讓 React 程式碼讀取
        window.fb = { db, auth, collection, addDoc, onSnapshot, serverTimestamp, signInAnonymously, query, orderBy, limit };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SvgIcon = ({ size = 24, className = '', fill = 'none', strokeWidth = "2", children }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const Home = (props) => <SvgIcon {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></SvgIcon>;
        const BarChart2 = (props) => <SvgIcon {...props}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></SvgIcon>;
        const MessageCircle = (props) => <SvgIcon {...props}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></SvgIcon>;
        const Sparkles = (props) => <SvgIcon {...props} strokeWidth="1.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4M3 5h4M19 3v4M17 5h4M5 19v4M3 21h4"/></SvgIcon>;
        const Send = (props) => <SvgIcon {...props}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></SvgIcon>;
        const CheckCircle2 = (props) => <SvgIcon {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></SvgIcon>;
        const Heart = (props) => <SvgIcon {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></SvgIcon>;

        const ITEMS = [
            { id: 'globe', name: '地球儀', desc: '導遊 / 旅遊家', emoji: '🌍' },
            { id: 'blackboard', name: '黑板', desc: '老師 / 教授', emoji: '🧑‍🏫' },
            { id: 'robot', name: '機器人', desc: '科技研發', emoji: '🤖' },
            { id: 'mic', name: '麥克風', desc: '歌手 / 藝人', emoji: '🎤' },
            { id: 'piano', name: '鋼琴', desc: '音樂家', emoji: '🎹' },
            { id: 'computer', name: '電腦', desc: '程式工程師', emoji: '💻' },
            { id: 'astronaut', name: '太空人', desc: '航太產業', emoji: '🧑‍🚀' },
            { id: 'seal', name: '官印', desc: '政治人物', emoji: '💮' },
            { id: 'airplane', name: '飛機', desc: '機長 / 空服員', emoji: '✈️' },
            { id: 'phd_hat', name: '博士帽', desc: '學者專家', emoji: '🎓' },
            { id: 'football', name: '足球', desc: '運動員', emoji: '⚽' },
            { id: 'face_doll', name: '變臉娃娃', desc: '心理諮商師', emoji: '🎭' },
            { id: 'magnifier', name: '放大鏡', desc: '科學家', emoji: '🔍' },
            { id: 'camera', name: '相機', desc: '攝影師', emoji: '📷' },
            { id: 'spatula', name: '鍋鏟', desc: '廚師', emoji: '🍳' },
            { id: 'gavel', name: '法官槌', desc: '法官 / 律師', emoji: '⚖️' },
            { id: 'gold_ingot', name: '元寶', desc: '企業家 / 有錢人', emoji: '💰' },
            { id: 'ruler_pen', name: '尺+筆', desc: '建築設計師', emoji: '📏✏️' },
            { id: 'stethoscope', name: '聽診器', desc: '醫生 / 護士', emoji: '🩺' },
            { id: 'phone', name: '手機', desc: '業務 / 網紅', emoji: '📱' },
            { id: 'abacus', name: '算盤', desc: '商人 / 會計師', emoji: '🧮' },
            { id: 'clapperboard', name: '場記板', desc: '導演 / 演員', emoji: '🎬' },
            { id: 'baozi', name: '包子', desc: '美食家', emoji: '🥟' },
            { id: 'palette', name: '畫盤', desc: '畫家 / 藝術家', emoji: '🎨' },
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('results');
            const [votes, setVotes] = useState([]);
            const [messages, setMessages] = useState([]);
            const [name, setName] = useState('');
            const [msgText, setMsgText] = useState('');
            const [selected, setSelected] = useState([]);
            const [voted, setVoted] = useState(localStorage.getItem('voted_ian_final') === 'true');
            const [isSending, setIsSending] = useState(false);
            const [imgError, setImgError] = useState(false);

            useEffect(() => {
                const init = async () => {
                    while(!window.fb) await new Promise(r => setTimeout(r, 100));
                    const { db, auth, collection, onSnapshot, signInAnonymously } = window.fb;
                    
                    // 🌟 防卡死保護罩：如果無痕模式阻擋登入，跳過錯誤繼續拉取資料
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.warn("被無痕模式擋住登入，已啟動備用讀取模式");
                    }
                    
                    // 即時監聽投票
                    onSnapshot(collection(db, "votes"), s => setVotes(s.docs.map(d => d.data())));
                    
                    // 即時監聽留言 (安全時間排序，防報錯)
                    onSnapshot(collection(db, "messages"), s => {
                        const msgs = s.docs.map(d => {
                            const data = d.data();
                            return { ...data, safeTime: data.time ? data.time.toMillis() : Date.now() };
                        }).sort((a, b) => b.safeTime - a.safeTime);
                        setMessages(msgs);
                    });
                };
                init();
            }, []);

            const ageString = useMemo(() => {
                const birth = new Date(2025, 3, 13);
                const today = new Date();
                const diff = today - birth;
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                return `${Math.floor(d / 365)}Y ${Math.floor((d % 365) / 30)}M ${d % 30}D`;
            }, []);

            const submitVote = async () => {
                if(selected.length !== 3 || !name) return;
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    await addDoc(collection(db, "votes"), { name, items: selected, time: serverTimestamp() });
                    localStorage.setItem('voted_ian_final', 'true');
                    setVoted(true);
                    setActiveTab('results');
                    window.scrollTo(0, 0);
                } catch(e) {
                    alert('送出失敗，請重試！');
                }
            };

            const submitMessage = async () => {
                if(!name || !msgText) {
                    alert('請填寫名字和祝福內容喔！');
                    return;
                }
                setIsSending(true);
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    await addDoc(collection(db, "messages"), { name, text: msgText, time: serverTimestamp() });
                    setMsgText('');
                    alert('祝福已送出！');
                } catch(e) {
                    alert('留言失敗，請重試！');
                }
                setIsSending(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-28 px-4 pt-8">
                    {/* ========== 1. 投票區 ========== */}
                    {activeTab === 'vote' && (
                        <div className="animate-fade-in">
                            <h1 className="text-2xl font-bold text-[#6B5A4E] text-center mb-6 tracking-widest">宇恩的抓周預測</h1>
                            {!voted ? (
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-[#F2E8DA]">
                                    <input className="w-full p-4 mb-4 rounded-2xl border-2 border-[#F2E8DA] focus:border-[#D4BCA1] outline-none" placeholder="您怎麼稱呼？ (例：大阿姨)" value={name} onChange={e=>setName(e.target.value)} />
                                    <p className="text-xs text-[#8C7A6D] mb-4 text-center">請選出您心目中宇恩會抓到的 3 個物品 ({selected.length}/3)</p>
                                    <div className="grid grid-cols-2 gap-3 mb-6">
                                        {ITEMS.map(item => {
                                            const isSelected = selected.find(i=>i.id===item.id);
                                            const isMaxedOut = selected.length >= 3 && !isSelected;
                                            return (
                                                <button key={item.id} onClick={() => {
                                                    if(isSelected) setSelected(selected.filter(i=>i.id!==item.id))
                                                    else if(selected.length < 3) setSelected([...selected, item])
                                                }} className={`relative p-3 rounded-2xl border-2 transition-all flex flex-col items-center justify-center ${isSelected ? 'bg-[#F2E8DA] border-[#D4BCA1] scale-105 shadow-sm' : 'bg-white border-transparent hover:border-[#EAE0D3]'} ${isMaxedOut ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                                    {isSelected && <div className="absolute top-1 right-1 text-[#D4BCA1] bg-white rounded-full"><CheckCircle2 size={16} fill="currentColor" className="text-[#D4BCA1]" /></div>}
                                                    <div className="text-3xl mb-1 filter drop-shadow-sm">{item.emoji}</div>
                                                    <div className={`text-sm font-bold ${isSelected ? 'text-[#6B5A4E]' : 'text-[#8C7A6D]'}`}>{item.name}</div>
                                                    <div className="text-[10px] text-[#A68A6E] mt-0.5">{item.desc}</div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <button disabled={selected.length!==3 || !name} onClick={submitVote} className={`w-full py-4 text-white rounded-2xl font-bold shadow-md transition-all ${(selected.length!==3 || !name) ? 'bg-[#D1C6BB] cursor-not-allowed opacity-70' : 'bg-[#C2A387] hover:bg-[#B39375]'}`}>送出預測 <Send size={18} className="inline mb-1" /></button>
                                </div>
                            ) : (
                                <div className="text-center p-10 bg-white rounded-3xl border border-[#F2E8DA] shadow-sm">
                                    <div className="w-20 h-20 bg-[#F2E8DA] rounded-full flex items-center justify-center mx-auto mb-4"><CheckCircle2 size={40} className="text-[#C2A387]" /></div>
                                    <h2 className="text-xl font-bold text-[#6B5A4E] mb-2">預測成功！</h2>
                                    <p className="text-[#8C7A6D] mt-2 mb-6">謝謝您的參與，點擊下方前往觀看即時戰況吧 🤍</p>
                                    <button onClick={() => setActiveTab('results')} className="px-6 py-3 bg-[#C2A387] text-white rounded-xl font-medium shadow-sm hover:bg-[#B39375] transition-colors">查看戰況 <BarChart2 size={16} className="inline ml-1 mb-0.5" /></button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* ========== 2. 即時戰況區 ========== */}
                    {activeTab === 'results' && (
                        <div className="animate-fade-in">
                            <h1 className="text-2xl font-bold text-[#6B5A4E] text-center mb-2 tracking-widest">即時戰況</h1>
                            <p className="text-[#8C7A6D] text-sm text-center mb-8">目前累積 {votes.length} 人投票</p>
                            
                            {votes.length === 0 ? (
                                <div className="text-center py-12 bg-white/60 rounded-3xl border border-dashed border-[#D4BCA1] shadow-sm">
                                    <p className="text-[#8C7A6D]">正在連線讀取中，如果沒看到代表還沒人搶頭香喔！</p>
                                </div>
                            ) : (
                                ITEMS.map((item, index) => {
                                    const count = votes.filter(v => v.items && v.items.find(i=>i.id===item.id)).length;
                                    return count > 0 && (
                                        <div key={item.id} className="bg-white p-4 mb-3 rounded-2xl shadow-sm flex items-center gap-4 border border-[#FDFBF7] relative overflow-hidden">
                                            <span className="text-3xl">{item.emoji}</span>
                                            <div className="flex-grow">
                                                <div className="flex justify-between text-sm font-bold text-[#6B5A4E] mb-1.5">
                                                    <span>{item.name} <span className="font-normal text-[10px] text-[#BDB1A6]">({item.desc})</span></span>
                                                    <span className="text-[#C2A387]">{count} 票</span>
                                                </div>
                                                <div className="w-full bg-[#F4F0EB] h-2.5 rounded-full overflow-hidden">
                                                    <div className="bg-gradient-to-r from-[#D4BCA1] to-[#C2A387] h-2.5 rounded-full transition-all duration-1000" style={{width: `${Math.max((count/Math.max(votes.length, 1))*100, 5)}%`}}></div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                }).sort((a, b) => {
                                    if(!a || !b) return 0;
                                    const countA = votes.filter(v => v.items && v.items.find(i=>i.id===a.key)).length;
                                    const countB = votes.filter(v => v.items && v.items.find(i=>i.id===b.key)).length;
                                    return countB - countA;
                                })
                            )}
                        </div>
                    )}

                    {/* ========== 3. 留言板區 ========== */}
                    {activeTab === 'about' && (
                        <div className="animate-fade-in">
                            <div className="bg-[#EAE0D3] rounded-3xl p-8 text-center shadow-inner relative overflow-hidden mb-6">
                                <Sparkles className="absolute top-4 left-4 text-[#D4BCA1] opacity-50" size={24} />
                                <Sparkles className="absolute bottom-4 right-4 text-[#D4BCA1] opacity-50" size={20} />
                                <div className="relative w-32 h-32 mx-auto mb-4">
                                    <div className="absolute inset-0 bg-[#D4BCA1] rounded-full blur-md opacity-40 transform translate-y-2"></div>
                                    {!imgError ? (
                                        <img src="./image.png" alt="宇恩" onError={() => setImgError(true)} className="relative w-full h-full rounded-full border-[4px] border-white object-cover shadow-sm transition-all" />
                                    ) : (
                                        <div className="relative w-full h-full rounded-full border-[4px] border-white bg-[#FDFBF7] text-[#C2A387] flex items-center justify-center text-5xl shadow-sm">👶🏻</div>
                                    )}
                                </div>
                                <p className="text-[#8C7A6D] text-sm font-medium tracking-wide mb-1">宇恩 已經在這個世界</p>
                                <h2 className="text-3xl font-bold text-[#5A4A42] tracking-wider mb-2 font-mono">{ageString}</h2>
                                <p className="text-[#A68A6E] text-xs">了 🤍</p>
                            </div>
                            
                            <div className="px-1 mb-8">
                                <div className="bg-white/80 backdrop-blur-sm rounded-[2rem] p-8 shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-[#F2E8DA]">
                                    <Heart className="text-[#D4BCA1] mb-6 mx-auto" size={28} strokeWidth="1.5" />
                                    <div className="space-y-6 text-center leading-[2.2] text-[#6B5A4E] text-[15px] font-medium tracking-[0.15em]">
                                        <p>宇恩，是我們在忙碌生活中<br/>最溫柔的重心。</p>
                                        <p>在成為爸爸媽媽的這段旅程裡，<br/>我們一邊學習、一邊成長，<br/>也一邊感受愛的樣子。</p>
                                        <p>抓周，不只是傳統習俗，<br/>更是我們為他留下的<br/>一段充滿祝福與參與的回憶。</p>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-[#F2E8DA] mb-8">
                                <h3 className="font-bold text-[#6B5A4E] mb-4 flex items-center gap-2"><MessageCircle size={20} className="text-[#C2A387]"/> 留下您的祝福</h3>
                                <input className="w-full p-3 mb-3 rounded-xl border border-[#F2E8DA] bg-[#FDFBF7] focus:border-[#D4BCA1] outline-none text-sm transition-colors" placeholder="您的名字" value={name} onChange={e=>setName(e.target.value)} />
                                <textarea className="w-full p-3 mb-3 rounded-xl border border-[#F2E8DA] bg-[#FDFBF7] focus:border-[#D4BCA1] outline-none text-sm h-24 resize-none transition-colors" placeholder="想對宇恩說的話..." value={msgText} onChange={e=>setMsgText(e.target.value)} />
                                <button onClick={submitMessage} disabled={isSending || !name || !msgText} className={`w-full py-3 text-white rounded-xl font-bold text-sm shadow-sm transition-colors ${(isSending || !name || !msgText) ? 'bg-[#D1C6BB] cursor-not-allowed opacity-70' : 'bg-[#C2A387] hover:bg-[#B39375]'}`}>{isSending?'傳送中...':'送出祝福'} <Send size={16} className="inline mb-0.5" /></button>
                            </div>

                            <div className="space-y-4">
                                <h3 className="font-bold text-[#6B5A4E] pl-2">祝福牆</h3>
                                {messages.length === 0 ? (
                                    <p className="text-center text-[#BDB1A6] text-sm py-6 bg-white/40 rounded-3xl border border-dashed border-[#D4BCA1]">正在連線，如果沒看到代表還沒人留言喔！</p>
                                ) : (
                                    messages.map((m, i) => (
                                        <div key={i} className="bg-white p-5 rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-[#FDFBF7]">
                                            <div className="flex justify-between items-center mb-3">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-8 h-8 bg-[#F2E8DA] rounded-full flex items-center justify-center text-[#A68A6E] font-bold text-sm">{m.name.charAt(0)}</div>
                                                    <span className="font-bold text-[#6B5A4E] text-sm">{m.name}</span>
                                                </div>
                                                <span className="text-[10px] text-[#BDB1A6]">{new Date(m.safeTime).toLocaleString('zh-TW', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' })}</span>
                                            </div>
                                            <p className="text-[#8C7A6D] text-sm leading-relaxed whitespace-pre-wrap pl-11">{m.text}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {/* ========== 底部導覽列 ========== */}
                    <nav className="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md shadow-[0_-10px_40px_rgba(139,115,97,0.08)] rounded-t-3xl z-50">
                        <div className="max-w-md mx-auto px-6 py-4 flex justify-between items-center">
                            <button onClick={()=>setActiveTab('results')} className={`flex flex-col items-center gap-1.5 transition-colors w-16 ${activeTab==='results'?'text-[#C2A387]':'text-[#D1C6BB]'}`}>
                                <BarChart2 size={24} />
                                <span className="text-[10px] font-bold tracking-widest">戰況</span>
                            </button>
                            <button onClick={()=>setActiveTab('vote')} className={`flex flex-col items-center gap-1.5 transition-colors w-16 ${activeTab==='vote'?'text-[#C2A387]':'text-[#D1C6BB]'}`}>
                                <Home size={24} fill={activeTab==='vote'?'currentColor':'none'} />
                                <span className="text-[10px] font-bold tracking-widest">投票</span>
                            </button>
                            <button onClick={()=>setActiveTab('about')} className={`flex flex-col items-center gap-1.5 transition-colors w-16 ${activeTab==='about'?'text-[#C2A387]':'text-[#D1C6BB]'}`}>
                                <MessageCircle size={24} fill={activeTab==='about'?'currentColor':'none'} />
                                <span className="text-[10px] font-bold tracking-widest">留言</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
